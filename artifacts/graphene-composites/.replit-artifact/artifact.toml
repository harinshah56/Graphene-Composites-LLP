kind = "web"
previewPath = "/"
title = "Graphene Composites LLP"
version = "1.0.0"
id = "artifacts/graphene-composites"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20308
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/graphene-composites run dev"

[services.env]
PORT = "20308"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/graphene-composites", "run", "build"]
publicDir = "artifacts/graphene-composites/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
