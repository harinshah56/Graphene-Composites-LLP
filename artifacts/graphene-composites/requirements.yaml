packages:
  "framer-motion": "For page transitions and scroll-triggered animations to give a premium feel"
  "react-hook-form": "For robust contact form handling"
  "@hookform/resolvers": "For Zod schema validation in the contact form"
  "zod": "For defining contact form data schema"
  "lucide-react": "For crisp icons across the site"

